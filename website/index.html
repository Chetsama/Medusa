<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Photography Portfolio</title>
  <script src="theme-init.js"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="nav-logo">My Photography</h1>
      <ul class="nav-menu">
        <li class="nav-item">
          <a href="index.html" class="nav-link active">Home</a>
        </li>
        <li class="nav-item">
          <a href="gallery.html" class="nav-link">Gallery</a>
        </li>
        <li class="nav-item">
          <a href="contact.html" class="nav-link">Contact</a>
        </li>
      </ul>
      <button id="theme-toggle" class="theme-toggle-btn">Toggle Theme</button>
    </div>
  </nav>

  <section class="hero">
    <h2>Capturing Moments, Creating Memories</h2>
    <p>Professional photography portfolio showcasing artistic vision and technical excellence</p>
    <a href="gallery.html" class="cta-button">View Portfolio</a>
  </section>

  <section class="carousel-section">
    <div class="carousel">
      <div class="carousel-inner">
        <div class="carousel-item active">
          <img src="images/photo1.jpg" alt="Photo 1">
        </div>
        <div class="carousel-item">
          <img src="images/photo2.jpg" alt="Photo 2">
        </div>
        <div class="carousel-item">
          <img src="images/photo3.jpg" alt="Photo 3">
        </div>
        <div class="carousel-item">
          <img src="images/photo4.jpg" alt="Photo 4">
        </div>
      </div>
      <button class="carousel-control prev">❮</button>
      <button class="carousel-control next">❯</button>
      <div class="carousel-indicators">
        <span class="indicator active"></span>
        <span class="indicator"></span>
        <span class="indicator"></span>
        <span class="indicator"></span>
      </div>
    </div>
  </section>

  <main>
    <section class="gallery">
      <!-- Images will be populated by JavaScript -->
    </section>
  </main>

  <script src="common-script.js"></script>
  <script src="script.js"></script>
</body>
</html>
